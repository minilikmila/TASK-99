# Isolated test environment — separate DB, configurable host port (default 3011), high rate limits.
# Spun up and torn down automatically by run_tests.sh.
#
# Usage:
#   export TEST_HOST_PORT=3011   # optional; default 3011
#   docker compose -f docker-compose.test.yml up --build -d
#   TEST_BASE_URL=http://localhost:${TEST_HOST_PORT:-3011} npx jest --testPathPattern=API_tests
#   docker compose -f docker-compose.test.yml down -v

services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     cftest
      POSTGRES_PASSWORD: cftest
      POSTGRES_DB:       cftest
    # tmpfs keeps the DB in RAM — fast teardown, no leftover volumes
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cftest -d cftest"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  app-test:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      NODE_ENV:                    test
      PORT:                        3000
      DATABASE_URL:                postgresql://cftest:cftest@db-test:5432/cftest
      JWT_SECRET:                  test-jwt-secret-exactly-32-charss
      JWT_EXPIRES_IN:              8h
      # Raised limits so tests never hit rate caps
      RATE_LIMIT_WRITE_PER_MIN:    2000
      RATE_LIMIT_READ_PER_MIN:     10000
      # Short lockout window so lockout tests resolve quickly
      LOGIN_LOCKOUT_ATTEMPTS:      5
      LOGIN_LOCKOUT_WINDOW_MINUTES: 1
      LOG_LEVEL:                   warn
      INTERNAL_API_KEY:            test-internal-key-secret
    ports:
      - "${TEST_HOST_PORT:-3011}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    entrypoint: ["sh", "scripts/entrypoint.test.sh"]
