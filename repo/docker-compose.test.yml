# Isolated test environment — separate DB, fixed host port 3011, high rate limits.
# Spun up and torn down automatically by run_tests.sh.
#
# Usage (all-in-Docker):
#   bash run_tests.sh           # unit + API tests
#   bash run_tests.sh --unit    # unit tests only
#   bash run_tests.sh --api     # API tests only

services:
  db-test:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: cftest
      MYSQL_USER:          cftest
      MYSQL_PASSWORD:      cftest
      MYSQL_DATABASE:      cftest
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    # tmpfs keeps the DB in RAM — fast teardown, no leftover volumes
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysql", "-h", "localhost", "-u", "cftest", "-pcftest", "-e", "SELECT 1"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 20s

  app-test:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      NODE_ENV:                    test
      PORT:                        3000
      DATABASE_URL:                mysql://cftest:cftest@db-test:3306/cftest
      JWT_SECRET:                  test-jwt-secret-exactly-32-charss
      JWT_EXPIRES_IN:              8h
      # Raised limits so tests never hit rate caps
      RATE_LIMIT_WRITE_PER_MIN:    2000
      RATE_LIMIT_READ_PER_MIN:     10000
      # Short lockout window so lockout tests resolve quickly
      LOGIN_LOCKOUT_ATTEMPTS:      5
      LOGIN_LOCKOUT_WINDOW_MINUTES: 1
      LOG_LEVEL:                   warn
      INTERNAL_API_KEY:            test-internal-key-secret
    ports:
      - "3011:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    entrypoint: ["sh", "scripts/entrypoint.test.sh"]

  # Ephemeral container for running jest inside Docker.
  # Used by run_tests.sh — not started by default (`profiles: [test]`).
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    profiles: ["test"]
    depends_on:
      app-test:
        condition: service_healthy
    environment:
      NODE_ENV:         test
      TEST_BASE_URL:    http://app-test:3000
      INTERNAL_API_KEY: test-internal-key-secret
