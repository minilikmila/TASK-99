services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-civicforum}
      MYSQL_USER: ${MYSQL_USER:-civicforum}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-civicforum}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-civicforum}
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - backup_volume:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Default to development — set NODE_ENV=production in .env for production deployments
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-civicforum}:${MYSQL_PASSWORD:-civicforum}@db:3306/${MYSQL_DATABASE:-civicforum}
      # REQUIRED in production: override these via .env file or shell environment.
      # The application refuses to start in production if secrets are missing or weak.
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-in-production-32chars-VALID-KEY-0123456789}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      RATE_LIMIT_WRITE_PER_MIN: ${RATE_LIMIT_WRITE_PER_MIN:-120}
      RATE_LIMIT_READ_PER_MIN: ${RATE_LIMIT_READ_PER_MIN:-600}
      LOGIN_LOCKOUT_ATTEMPTS: ${LOGIN_LOCKOUT_ATTEMPTS:-5}
      LOGIN_LOCKOUT_WINDOW_MINUTES: ${LOGIN_LOCKOUT_WINDOW_MINUTES:-15}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-dev-internal-api-key-VALID-KEY-0123456789abcdef}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - backup_volume:/backups

volumes:
  mysql_data:
  backup_volume:
