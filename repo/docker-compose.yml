version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: civicforum
      POSTGRES_PASSWORD: civicforum
      POSTGRES_DB: civicforum
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backup_volume:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicforum -d civicforum"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://civicforum:civicforum@db:5432/civicforum
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-in-production-32chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      RATE_LIMIT_WRITE_PER_MIN: ${RATE_LIMIT_WRITE_PER_MIN:-120}
      RATE_LIMIT_READ_PER_MIN: ${RATE_LIMIT_READ_PER_MIN:-600}
      LOGIN_LOCKOUT_ATTEMPTS: ${LOGIN_LOCKOUT_ATTEMPTS:-5}
      LOGIN_LOCKOUT_WINDOW_MINUTES: ${LOGIN_LOCKOUT_WINDOW_MINUTES:-15}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - backup_volume:/backups

volumes:
  postgres_data:
  backup_volume:
